name: Bug report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Visible in the startup banner.
      placeholder: v1.1.0
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Paste any error output verbatim. Screenshots are welcome.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: e.g. Windows 11 24H2

  - type: input
    id: network
    attributes:
      label: Network setup (if relevant)
      placeholder: e.g. USB Realtek NIC to a server's BMC port via an 8-port switch

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Workarounds tried, related links, etc.
